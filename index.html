<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALI AI - Mobile Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 5px solid #0000FF; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7); 
            box-shadow: 0 0 20px rgba(0, 0, 255, 0.5);
            z-index: 2;
        }

        .overlay h1 {
            color: #0000FF;
            font-size: 2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 255, 0.8);
        }

        .chat-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 2px solid #0000FF;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-box span {
            color: #00f0ff;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .contact-buttons {
            display: flex;
            gap: 10px;
        }

        .contact-btn {
            text-decoration: none;
            color: white;
            font-size: 1.2rem;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.3s;
        }

        .btn-whatsapp { background: #25D366; box-shadow: 0 0 10px #25D366; }
        .btn-telegram { background: #0088cc; box-shadow: 0 0 10px #0088cc; }

        /* زر القائمة (ثلاث شرطات) */
        .menu-container {
            position: relative;
        }
        .menu-icon {
            width: 35px;
            height: 35px;
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            border: 1px solid #0000FF;
        }
        .menu-icon span {
            width: 18px;
            height: 2px;
            background: cyan;
            border-radius: 2px;
        }
        .dropdown-menu {
            position: absolute;
            top: 45px;
            left: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid #0000FF;
            padding: 8px 0;
            min-width: 140px;
            display: none;
            z-index: 20;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-menu div {
            padding: 10px 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .dropdown-menu div:hover {
            background: #0000FF;
            color: black;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            max-width: 85%;
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.4;
        }

        .user-msg {
            align-self: flex-start;
            background: rgba(0, 0, 255, 0.5);
            color: white;
            border: 1px solid #0000FF;
            border-bottom-right-radius: 5px;
        }

        .bot-msg {
            align-self: flex-end;
            background: rgba(20, 20, 20, 0.8);
            color: #00f0ff;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-bottom-left-radius: 5px;
        }

        .input-bar {
            padding: 12px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            gap: 10px;
            border-top: 1px solid #0000FF;
        }

        .input-bar input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #0000FF;
            background: #050505;
            color: white;
            outline: none;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #0000FF;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px #0000FF;
            cursor: pointer;
        }

        @media screen and (max-height: 500px) {
            .overlay { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="overlay">
        <h1>ALI AI</h1>
    </div>

    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="logo-box">
                <i class="fas fa-microchip" style="color: #0000FF;"></i>
                <span>Ali AI</span>
            </div>
            
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="contact-buttons">
                    <a href="https://wa.me/+201221743490" target="_blank" class="contact-btn btn-whatsapp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="https://t.me/al0osh505" target="_blank" class="contact-btn btn-telegram">
                        <i class="fab fa-telegram-plane"></i>
                    </a>
                </div>

                <!-- ثلاث شرطات + قائمة حذف -->
                <div class="menu-container">
                    <div class="menu-icon" id="menuIcon">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <div id="deleteChatOption">🗑️ حذف المحادثة</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="chatBox" class="chat-container">
            <!-- سيتم تحميل المحادثات المحفوظة هنا -->
        </div>

        <form id="chatForm" class="input-bar">
            <input id="userInput" type="text" placeholder="أرسل رسالة..." autocomplete="off">
            <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        /* --- كود الماتريكس الأصلي (رموز خضراء) --- */
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "$#@&٪+-£÷×=^<>";
        const charArray = chars.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize; 
        const drops = [];
        for (let x = 0; x < columns; x++) { drops[x] = 1; }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; 
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        /* --- API الذكاء الاصطناعي --- */
        const GROQ_API_KEY = "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";
        const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";

        function shouldRespondWithCreatorInfo(text) {
            const lowerText = text.toLowerCase();
            const makerPatterns = ["من صنعك", "من طورك", "من عمل ذلك البوت", "من انشئك", "من صممك", "creator", "who made you", "who developed you", "who created you"];
            const phonePatterns = ["رقم الذي صنعك", "رقم هاتف الذي صنعك", "رقم المطور", "whatsapp number", "phone number of creator", "رقم مطورك"];
            const locationPatterns = ["لوكيشن", "موقع", "address", "مكان", "فين", "أين", "location", "منين", "عنوان", "الموقع", "لوكيشن المطور", "موقع المطور", "المطور ساكن فين", "المطور مكانه"];
            
            if (locationPatterns.some(pattern => lowerText.includes(pattern))) {
                return { type: "location", response: "من القنطرة غرب الاسماعيليه" };
            }
            if (phonePatterns.some(pattern => lowerText.includes(pattern))) {
                return { type: "phone", response: "01221743490" };
            }
            if (makerPatterns.some(pattern => lowerText.includes(pattern))) {
                return { type: "creator", response: "ALI GOMAA (Aloosh) الذي صنعني و طورني" };
            }
            return null;
        }

        async function callGroqAPI(userMessage) {
            try {
                const response = await fetch(GROQ_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            {
                                role: "system",
                                content: "أنت مساعد ذكي اسمك ALI AI. ردودك مختصرة ومفيدة باللغة العربية. إذا سألك المستخدم عن من صنعك أو من طورك، قل: ALI GOMAA (Aloosh) الذي صنعني و طورني. إذا سألك عن رقم هاتف من صنعك، قل: 01221743490. إذا سألك عن لوكيشن المطور أو موقع المطور، قل: من القنطرة غرب الاسماعيليه."
                            },
                            {
                                role: "user",
                                content: userMessage
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });
                
                if (response.status === 200) {
                    const data = await response.json();
                    return data.choices[0].message.content;
                } else {
                    return "عذراً، حدث خطأ تقني في الاتصال بالذكاء الاصطناعي.";
                }
            } catch (error) {
                return "حدث خطأ في الشبكة. تأكد من اتصالك بالإنترنت.";
            }
        }

        /* --- إدارة المحادثات و localStorage --- */
        const STORAGE_KEY = "aliAI_chatHistory";
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');
        const form = document.getElementById('chatForm');

        function saveCurrentChat() {
            const messages = [];
            const msgDivs = chatBox.querySelectorAll('.msg');
            msgDivs.forEach(div => {
                let type = div.classList.contains('user-msg') ? 'user' : 'bot';
                messages.push({ type: type, text: div.innerText });
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }

        function loadChat() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return false;
            
            const messages = JSON.parse(saved);
            if (messages.length === 0) return false;
            
            chatBox.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.type === 'user' ? 'user-msg' : 'bot-msg'}`;
                div.innerText = msg.text;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
            return true;
        }

        function startNewChat() {
            chatBox.innerHTML = '';
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'msg bot-msg';
            welcomeDiv.innerText = 'مرحباً بك، أنا ALI AI. كيف أخدمك اليوم؟';
            chatBox.appendChild(welcomeDiv);
            saveCurrentChat();
        }

        function clearAllChats() {
            localStorage.removeItem(STORAGE_KEY);
            startNewChat();
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            saveCurrentChat();
        }

        /* --- معالجة الرسائل --- */
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if(!text) return;

            appendMsg(text, 'user-msg');
            input.value = '';

            const specialResponse = shouldRespondWithCreatorInfo(text);
            if (specialResponse) {
                setTimeout(() => {
                    appendMsg(specialResponse.response, 'bot-msg');
                }, 500);
                return;
            }

            const typingMsg = document.createElement('div');
            typingMsg.className = 'msg bot-msg';
            typingMsg.innerText = 'جاري التفكير... 🤔';
            chatBox.appendChild(typingMsg);
            chatBox.scrollTop = chatBox.scrollHeight;
            saveCurrentChat();

            const aiReply = await callGroqAPI(text);
            
            chatBox.removeChild(typingMsg);
            appendMsg(aiReply, 'bot-msg');
        });

        /* --- قائمة الثلاث شرطات (حذف المحادثة) --- */
        const menuIcon = document.getElementById('menuIcon');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const deleteChatOption = document.getElementById('deleteChatOption');

        menuIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('show');
        });

        deleteChatOption.addEventListener('click', (e) => {
            e.stopPropagation();
            clearAllChats();
            dropdownMenu.classList.remove('show');
        });

        /* --- بدء التشغيل --- */
        const loaded = loadChat();
        if (!loaded) {
            startNewChat();
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
